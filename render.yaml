services:
  - type: web
    name: bangla-ocr-website
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-1.5-flash
      - key: MAX_IMAGE_DIMENSION
        value: "1600"
      - key: FLASK_DEBUG
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
