name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'mdalemrananas/BANGLA-OCR-WEBSITE'

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. Skipping deploy trigger."
            echo "Add the Render deploy hook URL in GitHub repo Settings > Secrets."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
